name: Cobrança Diária Automática

on:
  schedule:
    # Rodar às 12:00 UTC (09:00 Horário de Brasília)
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: pip install -r requirements.txt

      - name: Executar Script de Cobrança
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WAHA_URL: ${{ secrets.WAHA_URL }}
          WAHA_API_KEY: ${{ secrets.WAHA_API_KEY }}
          WAHA_SESSION: ${{ secrets.WAHA_SESSION }}
        run: python automation_job.py
